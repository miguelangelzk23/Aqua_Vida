<!-- PWA Install Banner -->
@if (showInstallBanner()) {
  <div class="fixed top-0 left-0 right-0 z-[100] bg-blue-600 text-white p-4 shadow-xl flex items-center justify-between sm:justify-center gap-4 animate-in slide-in-from-top-4 duration-300">
    <div class="flex items-center space-x-3">
      <div class="bg-white/20 p-2 rounded-lg backdrop-blur-sm">
        <svg lucideDownload class="w-6 h-6 text-white"></svg>
      </div>
      <div>
        <p class="font-bold text-sm leading-tight">Instala Aqua Vida POS</p>
        <p class="text-xs text-blue-100 font-medium">Acceso rápido y funciona sin conexión</p>
      </div>
    </div>
    <div class="flex items-center space-x-2 shrink-0">
      <button 
        (click)="closeBanner()" 
        class="text-xs font-bold px-3 py-2 text-blue-100 hover:text-white hover:bg-blue-700 rounded-lg transition-colors"
      >
        Ahora no
      </button>
      <button 
        (click)="installPwa()" 
        class="text-xs font-black px-4 py-2 bg-white text-blue-700 hover:bg-blue-50 rounded-lg shadow-sm active:scale-95 transition-all"
      >
        Instalar
      </button>
    </div>
  </div>
}

<router-outlet></router-outlet>
